payment-iban:
  build:
    context: ./payment-iban
    dockerfile: Dockerfile
  container_name: payment-iban-service
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy

services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
    command: air ./cmd/main.go -b 0.0.0.0

  postgres:
    image: postgres:15-alpine
    container_name: payment-iban-postgres
    environment:
      POSTGRES_DB: payment_iban
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payment-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U payment_user -d payment_iban" ]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:

networks:
  payment-network: