services:
  postgres:
    image: postgres:16
    container_name: payment-postgres
    environment:
      POSTGRES_DB: payment_DB
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_DATABASE_HOST: postgres
      APP_DATABASE_PORT: 5432
      APP_DATABASE_USER: payment_user
      APP_DATABASE_PASSWORD: payment_password
      APP_DATABASE_DBNAME: payment_DB
      APP_DATABASE_SSLMODE: disable
      APP_DATABASE_MIGRATIONS_PATH: /app/migrations
      APP_LOGGER_LEVEL: info
      APP_SERVER_PORT: 8080
    command: ["./server"]

  api:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_DATABASE_HOST: postgres
      APP_DATABASE_PORT: 5432
      APP_DATABASE_USER: payment_user
      APP_DATABASE_PASSWORD: payment_password
      APP_DATABASE_DBNAME: payment_DB
      APP_DATABASE_SSLMODE: disable
      APP_DATABASE_MIGRATIONS_PATH: /app/migrations
      APP_LOGGER_LEVEL: info
      APP_SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
